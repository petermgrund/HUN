<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    {% include head.html %}
    <style>
      /* Global page styling */
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background-color: #f8f9fa;
        color: #202122;
        margin: 0;
        padding: 0;
      }
      /* Center the main content area and mimic Wikipedia's content container */
      .page-content {
        margin: 20px auto;
        padding: 20px;
        background-color: #fff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        line-height: 1.6;
      }
      /* Table of Contents styling (inspired by Wikipedia) */
      #toc {
        background-color: #f8f9fa;
        border: 1px solid #a2a9b1;
        padding: 10px;
        margin-bottom: 20px;
        font-size: 0.9em;
      }
      #toc a {
        color: #0645ad;
        text-decoration: none;
      }
      #toc a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    {% include header.html %}
    <main class="page-content" aria-label="Content">
      {{ content }}
    </main>
    {% include footer.html %}
  </body>
</html>
